# Shopify app configuration for ZIP Code Dynamic Pricing
# Learn more: https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c27ceb0a82d1fd4706791a227491eae1"
name = "zip-price-tracker"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
scopes = "read_products"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

# ── App Proxy ──────────────────────────────────────────────────────────────────
# Shopify routes requests from <shop>.myshopify.com/apps/zip-pricing/*
# to the url below, appending HMAC query params for verification.
# Replace the URL with your actual Vercel deployment URL.
[app_proxy]
url = "https://internship-work-shopify-zip-code-dynamic-pricing.vercel.app/api/proxy"
subpath = "zip-pricing"
prefix = "apps"
